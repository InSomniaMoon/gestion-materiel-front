<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Frontend</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
    <style>
      .app-boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
      }
      .app-boot-loader__spinner {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 6px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        animation: app-boot-loader-spin 0.8s linear infinite;
      }
      @keyframes app-boot-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <app-root>
      <div class="app-boot-loader" aria-hidden="true">
        <div class="app-boot-loader__spinner"></div>
      </div>
    </app-root>
    <noscript
      >Please enable JavaScript to continue using this application.</noscript
    >
  </body>
</html>
