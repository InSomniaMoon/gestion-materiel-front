<form [formGroup]="form" class="modal-content">
  <p-float-label variant="on">
    <input
      id="username"
      type="text"
      pInputText
      formControlName="email"
      type="email"
      required />
    <label for="username">email</label>
  </p-float-label>
  @if (!isUserChecked()) {
    <p-button
      label="Vérifier l'utilisateur"
      icon="pi pi-check"
      iconPos="right"
      [disabled]="form.get('email')?.invalid"
      (onClick)="checkUser()" />
  } @else {
    <div class="flex">
      <p-float-label variant="on">
        <p-select
          id="structure"
          filter
          formControlName="structureId"
          [options]="structures()"
          optionLabel="name"
          optionValue="id" />
        <label for="structure">Structure</label>
      </p-float-label>

      <p-float-label variant="on">
        <p-select id="role" formControlName="role" [options]="roles" />
        <label for="role">Rôle</label>
      </p-float-label>
    </div>

    @if (userExists()) {
      <small
        >L'utilisateur existe, Veuillez assigner une mission pour le
        structure</small
      >
    } @else {
      <small class="text-danger"
        >L'utilisateur n'existe pas, veuillez le créer</small
      >
      <div class="flex">
        <p-float-label variant="on">
          <input id="lastName" pInputText formControlName="lastName" />
          <label for="lastName">Nom</label>
        </p-float-label>

        <p-float-label variant="on">
          <input id="firstName" pInputText formControlName="firstName" />
          <label for="firstName">Prénom</label>
        </p-float-label>
      </div>

      <p-float-label variant="on">
        <input id="phone" type="tel" pInputText formControlName="phone" />
        <label for="phone">Télephone <small>(optionnel)</small></label>
      </p-float-label>
    }
  }
</form>
<p-footer>
  <p-button
    label="Annuler"
    icon="pi pi-times"
    iconPos="left"
    (onClick)="close()" />
  <p-button
    label="Ajouter"
    icon="pi pi-check"
    iconPos="right"
    [disabled]="!form.valid"
    (onClick)="save()"
/></p-footer>
