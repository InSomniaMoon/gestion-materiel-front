<zxing-scanner
  [autofocusEnabled]="true"
  [formats]="[11]"
  [(device)]="desiredDevice"
  (scanSuccess)="alert($event)"
  (camerasFound)="onCamerasFound($event)" />
actual device: {{ desiredDevice()?.label || 'null' }}
<button (click)="switchCamera()">switch camera</button>

<br />
usable devices:
<ul>
  @for (camera of devices(); track $index) {
    <li>
      {{ camera.label || 'unknown' }}
      <button (click)="desiredDevice.set(camera)">use</button>
    </li>
  }
</ul>
